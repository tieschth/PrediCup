# Скопируй в config/config.yaml и подставь свои значения.
# Секреты (токены/ключи) сюда НЕ кладём — они в .env.

bot:
  # За сколько часов до старта матча открывать голосовалку
  vote_open_hours_before: 10
  # Часовой пояс для отображения времени матчей участникам
  display_timezone: "Europe/Moscow"

provider:
  # football_data_org | openfootball | mock
  name: mock
  # Код турнира у провайдера (football-data.org: WC)
  competition: "WC"

scheduler:
  sync_fixtures_hours: 6        # как часто обновлять расписание
  open_votes_minutes: 15        # как часто проверять, не пора ли открыть голосование
  resolve_results_minutes: 5    # как часто проверять результаты завершённых матчей

roles:
  # tg_id пользователей с доступом к /leaderboard и админ-командам
  admins: [123456789]
  # Чаты, где бот работает и постит голосовалки (id супергруппы, отрицательный)
  allowed_chats: [-1001234567890]

scoring:
  # Очки за угаданный исход (П1/Х/П2) на групповом этапе
  correct_outcome: 3
